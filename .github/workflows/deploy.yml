name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate config.js from secrets
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, json
          config = {
            "geminiKey": os.environ.get("GEMINI_KEY", ""),
            "claudeKey": os.environ.get("CLAUDE_KEY", ""),
          }
          with open("config.js", "w") as f:
            f.write("window.WORKOUT_CONFIG = " + json.dumps(config) + ";\n")
          print("config.js written, geminiKey present:", bool(config["geminiKey"]))
          PYEOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
